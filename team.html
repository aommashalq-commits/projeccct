<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فريق العمل | ArabPro</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14; --bg2: #0d1220; --card: #111827; --card2: #161f30;
    --border: rgba(59,130,246,0.15); --blue: #3b82f6; --blue2: #60a5fa;
    --blue-glow: rgba(59,130,246,0.3); --text: #f1f5f9; --muted: #94a3b8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image: linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);
    background-size:40px 40px; pointer-events:none; z-index:0;
  }
  nav {
    position:sticky; top:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 5%; height:64px;
    background:rgba(8,12,20,0.92); backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
  }
  .nav-logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .nav-logo img { width:34px; height:34px; border-radius:50%; border:2px solid rgba(59,130,246,0.3); }
  .nav-logo-text { font-family:'Orbitron',sans-serif; font-weight:700; font-size:1.1rem; color:#fff; }
  .btn-back {
    background:transparent; color:var(--text);
    border:1px solid var(--border); padding:8px 18px;
    border-radius:10px; font-family:'Cairo',sans-serif;
    font-weight:700; font-size:0.88rem; cursor:pointer;
    text-decoration:none; transition:all 0.2s;
  }
  .btn-back:hover { border-color:var(--blue); color:var(--blue); }
  .page-wrap {
    position:relative; z-index:1;
    max-width:860px; margin:0 auto;
    padding:60px 5% 100px;
  }
  .page-title {
    font-family:'Tajawal',sans-serif; font-size:2.2rem; font-weight:900;
    margin-bottom:8px;
  }
  .page-title span { color:var(--blue); }
  .page-divider {
    width:60px; height:3px; background:var(--blue);
    border-radius:2px; margin:16px 0 40px;
  }
  .section-block {
    background:var(--card); border:1px solid var(--border);
    border-radius:16px; padding:30px 32px; margin-bottom:20px;
  }
  .section-block h2 {
    font-size:1.05rem; font-weight:700; color:var(--blue2);
    margin-bottom:14px; display:flex; align-items:center; gap:8px;
  }
  .section-block h2::before {
    content:''; width:4px; height:18px;
    background:var(--blue); border-radius:2px; display:inline-block;
  }
  .section-block p, .section-block li {
    color:var(--muted); line-height:2; font-size:0.94rem;
  }
  .section-block ul { padding-right:20px; }
  .section-block li { margin-bottom:6px; list-style:disc; }
  footer-note {
    display:block; text-align:center; color:var(--muted);
    font-size:0.8rem; margin-top:40px;
  }
  .copy { text-align:center; color:var(--muted); font-size:0.8rem; margin-top:40px; }
</style>
</head>
