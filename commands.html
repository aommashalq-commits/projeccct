<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أوامر البوت | ArabPro</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080c14;--bg2:#0d1220;--card:#111827;--card2:#161f30;
    --border:rgba(59,130,246,0.15);--blue:#3b82f6;--blue2:#60a5fa;
    --text:#f1f5f9;--muted:#94a3b8;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;z-index:0;}

  header{position:relative;padding:80px 20px;text-align:center;background:radial-gradient(circle at center,rgba(59,130,246,0.1) 0,transparent 70%);}
  .h-logo{font-family:'Orbitron',sans-serif;font-size:42px;background:linear-gradient(to bottom,#fff,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-transform:uppercase;letter-spacing:4px;margin-bottom:15px;}
  .h-title{font-size:22px;color:var(--muted);font-weight:500;}

  .main-container{max-width:1200px;margin:0 auto;padding:0 20px 80px;position:relative;z-index:1;}
  
  .controls{margin-bottom:40px;display:flex;flex-direction:column;gap:20px;}
  .search-box{position:relative;max-width:600px;margin:0 auto;width:100%;}
  .search-box input{width:100%;background:var(--card2);border:1px solid var(--border);padding:18px 25px;border-radius:15px;color:#fff;font-family:'Cairo';font-size:16px;outline:none;transition:0.3s;}
  .search-box input:focus{border-color:var(--blue);box-shadow:0 0 20px rgba(59,130,246,0.15);}

  .cat-tabs{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;}
  .cat-tab{padding:10px 22px;background:var(--card);border:1px solid var(--border);border-radius:30px;cursor:pointer;font-weight:600;font-size:14px;color:var(--muted);transition:0.3s;}
  .cat-tab:hover{background:var(--card2);color:#fff;}
  .cat-tab.active{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 5px 15px rgba(59,130,246,0.3);}

  .commands-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;}
  .command-card{background:var(--card);border:1px solid var(--border);padding:25px;border-radius:20px;cursor:pointer;transition:all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);position:relative;overflow:hidden;}
  .command-card:hover{transform:translateY(-8px);background:var(--card2);border-color:var(--blue);}
  .command-card::before{content:'';position:absolute;top:0;right:0;width:40px;height:40px;background:linear-gradient(225deg,rgba(59,130,246,0.1) 50%,transparent 50%);}
  
  .cmd-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:15px;}
  .cmd-name{font-size:20px;font-weight:700;color:var(--blue2);}
  .cmd-cat-tag{font-size:12px;padding:4px 10px;background:rgba(59,130,246,0.1);border-radius:6px;color:var(--blue2);border:1px solid rgba(59,130,246,0.2);}
  .cmd-desc{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:20px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .cmd-footer{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding-top:15px;border-top:1px solid var(--border);}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(8,12,20,0.9);backdrop-filter:blur(10px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;opacity:0;transition:0.3s;}
  .modal-overlay.open{display:flex;opacity:1;}
  .modal-card{background:var(--card2);width:100%;max-width:650px;border-radius:25px;border:1px solid var(--border);position:relative;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);transform:scale(0.9);transition:0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
  .modal-overlay.open .modal-card{transform:scale(1);}
  
  .modal-header{padding:40px 40px 20px;border-bottom:1px solid var(--border);}
  .modal-close{position:absolute;top:20px;left:20px;width:35px;height:35px;background:rgba(255,255,255,0.05);border:none;border-radius:50%;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.3s;}
  .modal-close:hover{background:rgba(239,68,68,0.2);color:#ef4444;}
  
  .m-label{font-size:12px;color:var(--blue);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:8px;display:block;}
  .m-title{font-size:32px;font-weight:900;margin-bottom:15px;}
  .m-desc{color:var(--muted);line-height:1.8;font-size:16px;}
  
  .modal-body{padding:40px;display:flex;flex-direction:column;gap:30px;}
  .info-box{background:rgba(255,255,255,0.02);padding:20px;border-radius:15px;border:1px solid var(--border);}
  .usage-box{font-family:monospace;background:#000;color:var(--blue2);direction:ltr;text-align:left;padding:15px;border-radius:10px;font-size:15px;}
  
  @media (max-width:768px){
    .h-logo{font-size:32px;}
    .commands-grid{grid-template-columns:1fr;}
    .modal-body{padding:25px;}
  }
</style>
</head>
<body>

<header>
  <div class="h-logo">ArabPro</div>
  <div class="h-title">دليل أوامر النظام والإدارة</div>
</header>

<div class="main-container">
  <div class="controls">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="ابحث عن أمر معين (مثال: حظر، رتبة)...">
    </div>
    <div class="cat-tabs" id="catTabs">
      <div class="cat-tab active" data-cat="all">الكل</div>
      <div class="cat-tab" data-cat="general">🌐 عامة</div>
      <div class="cat-tab" data-cat="economy">💰 مالية</div>
      <div class="cat-tab" data-cat="mod">🛡️ إشراف</div>
      <div class="cat-tab" data-cat="setup">⚙️ إعدادات</div>
      <div class="cat-tab" data-cat="channels">📂 قنوات</div>
    </div>
  </div>

  <div class="commands-grid" id="commandsGrid"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-header">
      <span class="m-label">تفاصيل الأمر</span>
      <h2 class="m-title" id="mTitle"></h2>
      <p class="m-desc" id="mDesc"></p>
    </div>
    <div class="modal-body">
      <div>
        <span class="m-label">طريقة الاستخدام</span>
        <div class="usage-box" id="mUsage"></div>
      </div>
      <div>
        <span class="m-label">الصلاحيات المطلوبة</span>
        <div id="mPerms" style="font-weight:600;"></div>
      </div>
      <div id="mNoteArea">
        <span class="m-label" style="color:#eab308">ملاحظة هامة</span>
        <p id="mNote" style="font-size:14px; color:var(--muted)"></p>
      </div>
    </div>
  </div>
</div>

<script>
// مصفوفة الأوامر (تم إصلاح نزول الأسطر فيها)
var commands = [
  {cmd:'/عملاتي',cat:'economy',catLabel:'💰 المالية والعملات',desc:'عرض رصيدك الحالي من العملات داخل السيرفر، أو الاستعلام عن رصيد مستخدم آخر.',usage:'/عملاتي\n/عملاتي @المستخدم',perms:['للجميع'],note:'يمكن استخدامها بدون ذكر مستخدم لعرض رصيدك أنت.'},
  {cmd:'/يومي',cat:'economy',catLabel:'💰 المالية والعملات',desc:'استلام المكافأة المالية المجانية المتاحة مرة واحدة كل 24 ساعة.',usage:'/يومي',perms:['للجميع'],note:'تُعاد تهيئة المكافأة كل 24 ساعة تلقائياً.'},
  {cmd:'/تحويل',cat:'economy',catLabel:'💰 المالية والعملات',desc:'تحويل مبلغ مالي من رصيدك الشخصي إلى رصيد مستخدم آخر.',usage:'/تحويل @المستخدم [المبلغ]',perms:['للجميع'],note:'يُستقطع مبلغ الضريبة تلقائياً من المبلغ المُحوَّل.'},
  {cmd:'/ضرائب',cat:'economy',catLabel:'💰 المالية والعملات',desc:'حساب الضريبة المستقطعة عند التحويل لضمان وصول المبلغ المطلوب بدقة.',usage:'/ضرائب [المبلغ]',perms:['للجميع'],note:null},
  {cmd:'/ضبط_خط',cat:'setup',catLabel:'⚙️ إعدادات السيرفر',desc:'تفعيل نظام الخط التلقائي؛ حيث يرسل البوت صورة خط فاصلة بعد كل رسالة في قناة محددة.',usage:'/ضبط_خط #القناة',perms:['مدير السيرفر','إدارة القنوات'],note:null},
  {cmd:'/ضبط_رول_تلقائي',cat:'setup',catLabel:'⚙️ إعدادات السيرفر',desc:'تحديد رتبة تُمنح تلقائياً لأي عضو جديد ينضم للسيرفر.',usage:'/ضبط_رول_تلقائي @الرتبة',perms:['مدير السيرفر','إدارة الرتب'],note:'تأكد أن رتبة البوت أعلى من الرتبة المراد منحها.'},
  {cmd:'/ضبط_الآراء',cat:'setup',catLabel:'⚙️ إعدادات السيرفر',desc:'تخصيص قناة معينة لاستقبال تقييمات وآراء الأعضاء.',usage:'/ضبط_الآراء #القناة',perms:['مدير السيرفر'],note:null},
  {cmd:'/ضبط_الاقتراحات',cat:'setup',catLabel:'⚙️ إعدادات السيرفر',desc:'تخصيص قناة لاستقبال مقترحات الأعضاء وتطوير السيرفر.',usage:'/ضبط_الاقتراحات #القناة',perms:['مدير السيرفر'],note:null},
  {cmd:'/تحديد_روم_اللفلات',cat:'setup',catLabel:'⚙️ إعدادات السيرفر',desc:'اختيار القناة التي تظهر فيها إشعارات ترقية مستوى الأعضاء.',usage:'/تحديد_روم_اللفلات #القناة',perms:['مدير السيرفر'],note:null},
  {cmd:'/هوية-عضو',cat:'general',catLabel:'🌐 عامة',desc:'عرض بطاقة معلومات مفصلة عن المستخدم تشمل تاريخ الانضمام والآيدي والرتب.',usage:'/هوية-عضو\n/هوية-عضو @المستخدم',perms:['للجميع'],note:null},
  {cmd:'/هوية-سيرفر',cat:'general',catLabel:'🌐 عامة',desc:'عرض إحصائيات ومعلومات كاملة عن السيرفر الحالي.',usage:'/هوية-سيرفر',perms:['للجميع'],note:null},
  {cmd:'/مستوى',cat:'general',catLabel:'🌐 عامة',desc:'عرض بطاقة المستوى والنشاط الحالي للعضو.',usage:'/مستوى\n/مستوى @المستخدم',perms:['للجميع'],note:null},
  {cmd:'/أفاتار',cat:'general',catLabel:'🌐 عامة',desc:'عرض وتحميل صورة الحساب الشخصي لأي عضو.',usage:'/أفاتار\n/أفاتار @المستخدم',perms:['للجميع'],note:null},
  {cmd:'/بنر',cat:'general',catLabel:'🌐 عامة',desc:'عرض وتحميل صورة الخلفية (Banner) الخاصة بحساب العضو.',usage:'/بنر\n/بنر @المستخدم',perms:['للجميع'],note:null},
  {cmd:'/تصويت',cat:'general',catLabel:'🌐 عامة',desc:'إنشاء استفتاء سريع للأعضاء حول موضوع معين.',usage:'/تصويت [الموضوع]',perms:['للجميع'],note:null},
  {cmd:'/جيف_أواي',cat:'general',catLabel:'🌐 عامة',desc:'إنشاء مسابقة تلقائية على جائزة محددة لفترة زمنية معينة.',usage:'/جيف_أواي [المدة] [عدد الفائزين] [الجائزة]',perms:['إدارة الرسائل'],note:null},
  {cmd:'/سرعة_الاتصال',cat:'general',catLabel:'🌐 عامة',desc:'قياس سرعة استجابة البوت (Ping).',usage:'/سرعة_الاتصال',perms:['للجميع'],note:null},
  {cmd:'/مساعدة',cat:'general',catLabel:'🌐 عامة',desc:'عرض قائمة التعليمات والمساعدة للأوامر المختصرة.',usage:'/مساعدة',perms:['للجميع'],note:null},
  {cmd:'/حظر',cat:'mod',catLabel:'🛡️ الإشراف',desc:'طرد عضو من السيرفر ومنعه من الدخول نهائياً.',usage:'/حظر @العضو [السبب]',perms:['حظر الأعضاء'],note:'يتم إرسال إشعار للعضو المحظور بسبب الحظر.'},
  {cmd:'/إزالة_حظر',cat:'mod',catLabel:'🛡️ الإشراف',desc:'فك الحظر عن عضو سبق حظره باستخدام الآيدي الخاص به.',usage:'/إزالة_حظر [ID العضو]',perms:['حظر الأعضاء'],note:'يجب استخدام الآيدي الرقمي للعضو وليس اليوزر.'},
  {cmd:'/طرد',cat:'mod',catLabel:'🛡️ الإشراف',desc:'إخراج عضو من السيرفر مع إمكانية عودته لاحقاً عبر رابط دعوة.',usage:'/طرد @العضو [السبب]',perms:['طرد الأعضاء'],note:null},
  {cmd:'/ميوت',cat:'mod',catLabel:'🛡️ الإشراف',desc:'تقييد العضو ومنعه من الكتابة في القنوات لفترة زمنية محددة.',usage:'/ميوت @العضو [المدة بالدقائق] [السبب]',perms:['إدارة الرسائل','تقييد الأعضاء'],note:null},
  {cmd:'/إزالة_الميوت',cat:'mod',catLabel:'🛡️ الإشراف',desc:'فك القيود عن العضو والسماح له بالكتابة مرة أخرى.',usage:'/إزالة_الميوت @العضو',perms:['إدارة الرسائل','تقييد الأعضاء'],note:null},
  {cmd:'/تحذير',cat:'mod',catLabel:'🛡️ الإشراف',desc:'توجيه إنذار رسمي للعضو بسبب مخالفة القوانين.',usage:'/تحذير @العضو [السبب]',perms:['إدارة الرسائل'],note:'يُسجَّل التحذير في سجل العضو ويمكن مراجعته لاحقاً.'},
  {cmd:'/إزالة_التحذير',cat:'mod',catLabel:'🛡️ الإشراف',desc:'مسح سجل التحذيرات الخاص بالعضو بالكامل.',usage:'/إزالة_التحذير @العضو',perms:['إدارة الرسائل'],note:null},
  {cmd:'/مسح_رسائل',cat:'mod',catLabel:'🛡️ الإشراف',desc:'حذف عدد محدد من الرسائل من القناة الحالية.',usage:'/مسح_رسائل [العدد]',perms:['إدارة الرسائل'],note:'الحد الأقصى 100 رسالة في كل مرة.'},
  {cmd:'/قفل',cat:'channels',catLabel:'📂 القنوات والرتب',desc:'إغلاق القناة الحالية ومنع الأعضاء من إرسال الرسائل فيها.',usage:'/قفل [السبب]',perms:['إدارة القنوات'],note:null},
  {cmd:'/فتح',cat:'channels',catLabel:'📂 القنوات والرتب',desc:'إعادة فتح القناة المغلقة والسماح بالأعضاء بالكتابة مجدداً.',usage:'/فتح',perms:['إدارة القنوات'],note:null},
  {cmd:'/إخفاء',cat:'channels',catLabel:'📂 القنوات والرتب',desc:'جعل القناة الحالية غير مرئية للأعضاء العاديين.',usage:'/إخفاء',perms:['إدارة القنوات'],note:null},
  {cmd:'/إظهار',cat:'channels',catLabel:'📂 القنوات والرتب',desc:'جعل القناة مرئية للجميع مرة أخرى.',usage:'/إظهار',perms:['إدارة القنوات'],note:null},
  {cmd:'/نقل_عضو_صوتي',cat:'channels',catLabel:'📂 القنوات والرتب',desc:'نقل عضو من قناة صوتية إلى قناة صوتية أخرى.',usage:'/نقل_عضو_صوتي @العضو #القناة',perms:['نقل الأعضاء'],note:'يجب أن يكون العضو متواجداً في قناة صوتية.'},
  {cmd:'/اعطاء_رول',cat:'channels',catLabel:'📂 القنوات والرتب',desc:'منح رتبة محددة لعضو أو سحبها منه بضغطة زر.',usage:'/اعطاء_رول @العضو @الرتبة',perms:['إدارة الرتب'],note:'رتبة البوت يجب أن تكون أعلى من الرتبة المراد إضافة بها.'}
];

var currentCat = 'all';

// دالة عرض البطاقات
function renderCommands(list) {
  var grid = document.getElementById('commandsGrid');
  grid.innerHTML = '';
  list.forEach(function(cmd) {
    var card = document.createElement('div');
    card.className = 'command-card';
    card.onclick = function() { openModal(cmd); };
    card.innerHTML = `
      <div class="cmd-header">
        <div class="cmd-name">${cmd.cmd}</div>
        <div class="cmd-cat-tag">${cmd.catLabel}</div>
      </div>
      <p class="cmd-desc">${cmd.desc}</p>
      <div class="cmd-footer">
        <span>الصلاحيات: ${cmd.perms.join(', ')}</span>
        <span style="color:var(--blue)">التفاصيل ←</span>
      </div>
    `;
    grid.appendChild(card);
  });
}

// نافذة التفاصيل
function openModal(cmd) {
  document.getElementById('mTitle').innerText = cmd.cmd;
  document.getElementById('mDesc').innerText = cmd.desc;
  document.getElementById('mUsage').innerHTML = cmd.usage.replace(/\n/g, '<br>');
  document.getElementById('mPerms').innerText = cmd.perms.join(', ');
  
  var noteArea = document.getElementById('mNoteArea');
  if(cmd.note) {
    noteArea.style.display = 'block';
    document.getElementById('mNote').innerText = cmd.note;
  } else {
    noteArea.style.display = 'none';
  }
  
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// تبديل الأقسام
document.getElementById('catTabs').addEventListener('click', function(e) {
  var btn = e.target.closest('.cat-tab');
  if(!btn) return;
  
  document.querySelectorAll('.cat-tab').forEach(function(t){ t.classList.remove('active'); });
  btn.classList.add('active');
  
  currentCat = btn.dataset.cat;
  document.getElementById('searchInput').value = '';
  
  var filtered = currentCat === 'all' ? commands : commands.filter(function(c){ return c.cat === currentCat; });
  renderCommands(filtered);
});

// البحث الذكي
document.getElementById('searchInput').addEventListener('input', function() {
  var q = this.value.trim().toLowerCase();
  var base = currentCat === 'all' ? commands : commands.filter(function(c){ return c.cat === currentCat; });
  
  var filtered = q ? base.filter(function(c){ 
    return c.cmd.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q); 
  }) : base;
  
  renderCommands(filtered);
});

// إغلاق النافذة
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if(e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) { if(e.key === 'Escape') closeModal(); });

// التشغيل الأولي
renderCommands(commands);
</script>

</body>
</html>
