<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أوامر البوت | ArabPro</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080c14;--bg2:#0d1220;--card:#111827;--card2:#161f30;
    --border:rgba(59,130,246,0.15);--blue:#3b82f6;--blue2:#60a5fa;
    --blue-glow:rgba(59,130,246,0.3);--text:#f1f5f9;--muted:#94a3b8;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;z-index:0;}

  nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
    padding:0 5%;height:64px;background:rgba(8,12,20,0.92);backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);}
  .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .nav-logo img{width:34px;height:34px;border-radius:50%;border:2px solid rgba(59,130,246,0.3);}
  .nav-logo-text{font-family:'Orbitron',sans-serif;font-weight:700;font-size:1.1rem;color:#fff;}
  .btn-back{background:transparent;color:var(--text);border:1px solid var(--border);padding:8px 18px;
    border-radius:10px;font-family:'Cairo',sans-serif;font-weight:700;font-size:0.88rem;
    cursor:pointer;text-decoration:none;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
  .btn-back:hover{border-color:var(--blue);color:var(--blue);}

  .page-wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:50px 5% 100px;}

  .page-header{text-align:center;margin-bottom:50px;}
  .page-header h1{font-family:'Tajawal',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;margin-bottom:10px;}
  .page-header h1 span{color:var(--blue);}
  .page-header p{color:var(--muted);font-size:1rem;}
  .divider{width:60px;height:3px;background:var(--blue);border-radius:2px;margin:14px auto 0;}

  /* Search */
  .search-wrap{position:relative;max-width:500px;margin:0 auto 40px;}
  .search-wrap input{
    width:100%;padding:14px 20px 14px 48px;
    background:var(--card);border:1px solid var(--border);
    border-radius:14px;color:var(--text);font-family:'Cairo',sans-serif;
    font-size:0.95rem;outline:none;transition:border-color 0.2s;
  }
  .search-wrap input:focus{border-color:var(--blue);}
  .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem;}
  .search-wrap input::placeholder{color:var(--muted);}

  /* Category tabs */
  .cat-tabs{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:36px;}
  .cat-tab{
    padding:8px 18px;border-radius:999px;border:1px solid var(--border);
    background:var(--card);color:var(--muted);font-family:'Cairo',sans-serif;
    font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s;
  }
  .cat-tab:hover,.cat-tab.active{background:rgba(59,130,246,0.15);border-color:var(--blue);color:var(--blue2);}

  /* Category section */
  .cat-section{margin-bottom:40px;}
  .cat-title{
    display:flex;align-items:center;gap:10px;
    font-family:'Tajawal',sans-serif;font-size:1.2rem;font-weight:900;
    margin-bottom:16px;padding-bottom:12px;
    border-bottom:1px solid var(--border);
  }
  .cat-icon{
    width:36px;height:36px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;font-size:1rem;
  }

  /* Command card */
  .cmd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
  .cmd-card{
    background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:18px 20px;cursor:pointer;transition:all 0.25s;
    display:flex;flex-direction:column;gap:6px;
  }
  .cmd-card:hover{border-color:rgba(59,130,246,0.5);transform:translateY(-3px);
    box-shadow:0 12px 30px rgba(0,0,0,0.3);}
  .cmd-name{
    font-family:'Tajawal',sans-serif;font-weight:900;font-size:1rem;
    color:var(--blue2);display:flex;align-items:center;gap:8px;
  }
  .cmd-badge{
    font-size:0.68rem;padding:2px 8px;border-radius:999px;font-weight:700;
    font-family:'Cairo',sans-serif;
  }
  .badge-admin{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);}
  .badge-all{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3);}
  .badge-mod{background:rgba(251,146,60,0.15);color:#fb923c;border:1px solid rgba(251,146,60,0.3);}
  .cmd-desc{color:var(--muted);font-size:0.85rem;line-height:1.7;}

  /* Modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);
    z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--card2);border:1px solid rgba(59,130,246,0.3);
    border-radius:20px;padding:36px;max-width:560px;width:100%;
    position:relative;animation:popIn 0.25s ease;
    max-height:90vh;overflow-y:auto;
  }
  @keyframes popIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
  .modal-close{
    position:absolute;top:16px;left:16px;
    background:var(--card);border:1px solid var(--border);
    color:var(--muted);width:32px;height:32px;border-radius:8px;
    cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;
    transition:all 0.2s;
  }
  .modal-close:hover{border-color:var(--blue);color:var(--blue);}
  .modal-cmd{font-family:'Tajawal',sans-serif;font-size:1.6rem;font-weight:900;color:var(--blue2);margin-bottom:6px;}
  .modal-cat{font-size:0.8rem;color:var(--muted);margin-bottom:20px;}
  .modal-section{margin-bottom:18px;}
  .modal-section h3{
    font-size:0.8rem;font-weight:700;color:var(--blue);
    text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;
    display:flex;align-items:center;gap:6px;
  }
  .modal-section p{color:var(--muted);font-size:0.92rem;line-height:1.8;}
  .usage-box{
    background:var(--bg2);border:1px solid var(--border);
    border-radius:10px;padding:12px 16px;
    font-family:monospace;font-size:0.9rem;color:var(--blue2);
    margin-top:6px;direction:ltr;text-align:left;
  }
  .perm-tag{
    display:inline-flex;align-items:center;gap:5px;
    background:rgba(251,146,60,0.12);border:1px solid rgba(251,146,60,0.3);
    color:#fb923c;padding:4px 12px;border-radius:999px;font-size:0.8rem;font-weight:700;
    margin:3px;
  }

  .no-results{text-align:center;padding:60px 20px;color:var(--muted);}
  .no-results .icon{font-size:3rem;margin-bottom:12px;}

  .copy{text-align:center;color:var(--muted);font-size:0.8rem;margin-top:60px;padding-top:20px;border-top:1px solid var(--border);}

  @media(max-width:600px){
    .cmd-grid{grid-template-columns:1fr;}
    .cat-tabs{gap:7px;}
    .cat-tab{font-size:0.78rem;padding:6px 12px;}
  }
</style>
</head>

  setup:   { label:'⚙️ إعدادات السيرفر', color:'rgba(59,130,246,0.15)',  border:'rgba(59,130,246,0.3)',  text:'#60a5fa' },
  general: { label:'🌐 عامة',             color:'rgba(34,197,94,0.15)',   border:'rgba(34,197,94,0.3)',   text:'#4ade80' },
  mod:     { label:'🛡️ الإشراف',         color:'rgba(239,68,68,0.15)',   border:'rgba(239,68,68,0.3)',   text:'#f87171' },
  channels:{ label:'📂 القنوات والرتب',  color:'rgba(168,85,247,0.15)',  border:'rgba(168,85,247,0.3)',  text:'#c084fc' },
};

let currentCat = 'all';

function renderCommands(list) {
  const container = document.getElementById('commandsContainer');
  const noRes = document.getElementById('noResults');
  if (list.length === 0) { container.innerHTML=''; noRes.style.display='block'; return; }
  noRes.style.display='none';

  // Group by cat
  const groups = {};
  list.forEach(c => {
    if (!groups[c.cat]) groups[c.cat] = [];
    groups[c.cat].push(c);
  });

  const order = ['economy','setup','general','mod','channels'];
  let html = '';
  order.forEach(cat => {
    if (!groups[cat]) return;
    const m = catMeta[cat];
    html += `<div class="cat-section" data-cat="${cat}">
      <div class="cat-title">
        <div class="cat-icon" style="background:${m.color};border:1px solid ${m.border};color:${m.text}">${m.label.split(' ')[0]}</div>
        <span>${m.label.replace(/^\S+\s/,'')}</span>
        <span style="margin-right:auto;font-size:0.8rem;color:var(--muted);font-weight:400">${groups[cat].length} أوامر</span>
      </div>
      <div class="cmd-grid">`;
    groups[cat].forEach((c,i) => {
      const permLabel = c.perms.includes('للجميع') ? 'للجميع' : (c.perms.includes('مدير السيرفر') ? 'مدير' : 'مشرف');
      const badgeClass = permLabel==='للجميع'?'badge-all': permLabel==='مدير'?'badge-admin':'badge-mod';
      html += `<div class="cmd-card" onclick="openModal(${JSON.stringify(c).replace(/"/g,'&quot;')})">
        <div class="cmd-name">
          ${c.cmd}
          <span class="cmd-badge ${badgeClass}">${permLabel}</span>
        </div>
        <div class="cmd-desc">${c.desc}</div>
      </div>`;
    });
    html += '</div></div>';
  });
  container.innerHTML = html;
}

function filterCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('searchInput').value = '';
  const filtered = cat==='all' ? commands : commands.filter(c=>c.cat===cat);
  renderCommands(filtered);
}

function filterCommands() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let base = currentCat==='all' ? commands : commands.filter(c=>c.cat===currentCat);
  const filtered = q ? base.filter(c=>c.cmd.includes(q)||c.desc.includes(q)) : base;
  renderCommands(filtered);
}

function openModal(c) {
  document.getElementById('mCmd').textContent = c.cmd;
  document.getElementById('mCat').textContent = c.catLabel;
  document.getElementById('mDesc').textContent = c.desc;
  document.getElementById('mUsage').innerHTML = c.usage.replace(/\n/g,'<br>');
  const permsEl = document.getElementById('mPerms');
  permsEl.innerHTML = c.perms.map(p=>`<span class="perm-tag">🔑 ${p}</span>`).join('');
  const extraSec = document.getElementById('mExtraSection');
  if (c.note) { document.getElementById('mExtra').textContent=c.note; extraSec.style.display='block'; }
  else { extraSec.style.display='none'; }
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
}

function closeModal(e) {
  if (e.target===document.getElementById('modalOverlay')) closeModalBtn();
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModalBtn(); });

// Init
renderCommands(commands);
